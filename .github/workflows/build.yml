name: Build LAN Scanner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish never

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: LAN-Scanner-macOS
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: run: npx electron-builder --mac --universal --publish never

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LAN-Scanner-Windows
          path: dist/*.exe
